<!DOCTYPE html>
<html lang="es">

  <title>GUFFO · Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2300e5a0'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-size='18' font-weight='bold' fill='%230a0a0f'>G</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#07070c;--bg2:#0c0c14;--card:#0f0f19;--cardH:#151522;--brd:#1a1a2e;--acc:#00e5a0;--accD:rgba(0,229,160,.08);--dng:#ff4060;--wrn:#ffb020;--blu:#4466ff;--pur:#a855f7;--txt:#eeeef4;--txM:#8888a8;--txD:#55556a;--r:14px}
    *{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--txt);overflow-x:hidden}
    ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}
    @keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes scaleIn{from{opacity:0;transform:scale(.96) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .g{display:grid;gap:10px}.g6{grid-template-columns:repeat(6,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}.g21{grid-template-columns:2fr 1fr}
    @media(max-width:1100px){.g6{grid-template-columns:repeat(3,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}@media(max-width:700px){.g6,.g3,.g2,.g21{grid-template-columns:1fr}}
    select{background:var(--bg2);color:var(--txM);border:1px solid var(--brd);border-radius:6px;padding:5px 8px;font-size:10px;font-family:'Outfit';font-weight:600;cursor:pointer;outline:none}
    .ad-card{background:var(--bg);border:1px solid var(--brd);border-radius:10px;overflow:hidden;transition:all .25s;cursor:pointer}
    .ad-card:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,229,160,.08)}
    .ad-thumb{width:100%;aspect-ratio:1;object-fit:cover;background:var(--bg2);display:block}
    .ad-badge{position:absolute;top:6px;left:6px;font-size:8px;font-weight:800;letter-spacing:.08em;padding:3px 7px;border-radius:4px;backdrop-filter:blur(8px)}
    .play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.3);transition:all .2s}
    .ad-card:hover .play-btn{background:var(--acc);border-color:var(--acc);transform:translate(-50%,-50%) scale(1.1)}
    .tab-btn{padding:6px 14px;border-radius:7px;font-size:10px;font-weight:700;border:none;letter-spacing:.04em;cursor:pointer;transition:all .2s}
    .ai-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;opacity:0;animation:fadeIn .2s ease forwards}
    .ai-panel{position:fixed;right:0;top:0;bottom:0;width:520px;max-width:90vw;background:var(--card);border-left:1px solid var(--brd);z-index:200;transform:translateX(100%);animation:slideIn .3s ease forwards;overflow-y:auto;display:flex;flex-direction:column}
    @keyframes slideIn{to{transform:translateX(0)}}
    .ai-head{padding:16px 20px;border-bottom:1px solid var(--brd);position:sticky;top:0;background:var(--card);z-index:1}
    .ai-tabs{display:flex;gap:3px;background:var(--bg);border-radius:8px;padding:3px;margin-top:10px}
    .ai-tab{flex:1;padding:7px 6px;border-radius:6px;font-size:8px;font-weight:700;border:none;cursor:pointer;text-align:center;letter-spacing:.05em;transition:all .15s}
    .ai-body{flex:1;padding:20px;overflow-y:auto}
    .ai-text{font-size:12px;line-height:1.75;color:var(--txM);white-space:pre-wrap;font-family:'Inter',sans-serif}
    .ai-text b,.ai-text strong{color:var(--txt);font-weight:700}
    .ai-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px}
    .ai-dot-wrap{display:flex;gap:6px}
    .ai-dot{width:8px;height:8px;border-radius:50%;background:var(--acc);animation:aiBounce .6s infinite alternate}
    .ai-dot:nth-child(2){animation-delay:.15s}.ai-dot:nth-child(3){animation-delay:.3s}
    @keyframes aiBounce{to{opacity:.3;transform:translateY(-8px)}}
    .ai-btn{background:linear-gradient(135deg,#00e5a0,#4466ff);color:#070710;border:none;border-radius:8px;padding:8px 16px;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.08em;display:flex;align-items:center;gap:6px;transition:all .15s}
    .ai-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,229,160,.3)}
    .dp-trigger{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:6px 14px;cursor:pointer;transition:all .2s;position:relative;user-select:none}
    .dp-trigger:hover{border-color:rgba(0,229,160,.4);background:#10101a}
    .dp-trigger.open{border-color:var(--acc);box-shadow:0 0 0 3px rgba(0,229,160,.1)}
    .dp-label{font-size:12px;font-weight:600;color:var(--txt);white-space:nowrap}
    .dp-sub{font-size:9px;color:var(--txD);font-weight:600;letter-spacing:.06em}
    .dp-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--card);border:1px solid var(--brd);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03);z-index:50;animation:scaleIn .2s ease;overflow:hidden;min-width:540px}
    .dp-grid{display:grid;grid-template-columns:180px 1fr;min-height:340px}
    .dp-presets{border-right:1px solid var(--brd);padding:8px 0;display:flex;flex-direction:column}
    .dp-preset{padding:9px 18px;font-size:11px;font-weight:600;color:var(--txM);cursor:pointer;transition:all .15s;border:none;background:none;text-align:left;font-family:'Outfit';position:relative}
    .dp-preset:hover{color:var(--txt);background:rgba(255,255,255,.03)}
    .dp-preset.active{color:var(--acc);background:var(--accD)}
    .dp-preset.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0;background:var(--acc)}
    .dp-cal{padding:16px}
    .dp-cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .dp-cal-title{font-size:13px;font-weight:700;letter-spacing:.04em}
    .dp-cal-nav{display:flex;gap:4px}
    .dp-cal-nav button{width:28px;height:28px;border-radius:8px;border:1px solid var(--brd);background:var(--bg2);color:var(--txM);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .dp-cal-nav button:hover{border-color:var(--acc);color:var(--acc);background:rgba(0,229,160,.05)}
    .dp-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
    .dp-wd{text-align:center;font-size:9px;font-weight:800;color:var(--txD);letter-spacing:.15em;padding:4px 0}
    .dp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
    .dp-day{height:32px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;border-radius:8px;cursor:pointer;transition:all .12s;border:none;background:none;color:var(--txM);font-family:'Outfit';position:relative}
    .dp-day:hover:not(.empty):not(.disabled){background:rgba(255,255,255,.06);color:var(--txt)}
    .dp-day.today{color:var(--acc);font-weight:700}
    .dp-day.today::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--acc)}
    .dp-day.sel{background:var(--acc)!important;color:var(--bg)!important;font-weight:700}
    .dp-day.in-range{background:var(--accD);color:var(--acc);border-radius:0}
    .dp-day.range-start{background:var(--acc)!important;color:var(--bg)!important;font-weight:700;border-radius:8px 0 0 8px}
    .dp-day.range-end{background:var(--acc)!important;color:var(--bg)!important;font-weight:700;border-radius:0 8px 8px 0}
    .dp-day.range-start.range-end{border-radius:8px}
    .dp-day.disabled{color:var(--txD);opacity:.3;cursor:default}
    .dp-day.empty{cursor:default}
    .dp-day.has-data::before{content:'';position:absolute;top:3px;right:3px;width:3px;height:3px;border-radius:50%;background:var(--acc);opacity:.5}
    .dp-footer{border-top:1px solid var(--brd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
    .dp-footer-range{font-size:10px;color:var(--txM);font-family:'JetBrains Mono';font-weight:500;display:flex;align-items:center;gap:6px}
    .dp-footer-range span{background:var(--bg);padding:4px 10px;border-radius:6px;border:1px solid var(--brd)}
    .dp-footer-actions{display:flex;gap:6px}
    .dp-apply{background:var(--acc);color:var(--bg);border:none;border-radius:8px;padding:7px 18px;font-size:10px;font-weight:800;cursor:pointer;font-family:'Outfit';letter-spacing:.06em;transition:all .15s}
    .dp-apply:hover{box-shadow:0 4px 16px rgba(0,229,160,.3);transform:translateY(-1px)}
    .dp-clear{background:transparent;color:var(--txD);border:1px solid var(--brd);border-radius:8px;padding:7px 14px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Outfit';transition:all .15s}
    .dp-clear:hover{border-color:var(--txM);color:var(--txM)}
    @media(max-width:700px){.dp-dropdown{min-width:auto;right:-20px;left:-100px}.dp-grid{grid-template-columns:1fr}.dp-presets{flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--brd)}.dp-preset{white-space:nowrap;padding:8px 14px}}
  </style>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,useRef}=React;
const{BarChart,Bar,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Area,AreaChart}=Recharts;
const SID="1qD2vl0-vVmrlK0HCjA5wkyheOq4fjV8HCFMFVBLOl98";
const CSV_URL=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Diario`;
const ADS_URL=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Anuncios`;
const COM_SID="17gsT3xoYWk4Y5OuwZ-nNDS2B5WzJaWXn-ts4ELDKB8s";
const COM_URL=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Vendedoras`;
function parseCSV(t){const l=t.split("\n").filter(l=>l.trim());if(l.length<2)return[];const h=l[0].split(",").map(h=>h.replace(/"/g,"").trim());return l.slice(1).map(line=>{const v=[];let c="",q=false;for(const ch of line){if(ch==='"'){q=!q}else if(ch===","&&!q){v.push(c.trim());c=""}else{c+=ch}}v.push(c.trim());const r={};h.forEach((hh,i)=>{r[hh]=v[i]||""});return r})}
const pn=v=>{if(!v)return 0;let s=String(v).replace(/"/g,"").trim();s=s.replace(/,(\d+)$/,".$1").replace(/,/g,"");return parseFloat(s)||0};
const ps=v=>(v||"").replace(/^"+|"+$/g,"").trim();
const CUR={MXN:{s:"$",f:"MX"},USD:{s:"$",f:"US"},COP:{s:"$",f:"CO"}};
function fmt(n,d=0){return new Intl.NumberFormat("es-MX",{minimumFractionDigits:d,maximumFractionDigits:d}).format(n)}
function fP(n){return fmt(n,1)+"%"}
function safe(n,d){return d>0?n/d:0}
function sum(a,k){return a.reduce((s,d)=>s+d[k],0)}
const MESES=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const MESES_FULL=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
function fDate(f){const p=f.split("-");if(p.length!==3)return f;return`${parseInt(p[2])} ${MESES[parseInt(p[1])-1]} ${p[0]}`}
function fDateShort(f){const p=f.split("-");if(p.length!==3)return f;return`${parseInt(p[2])} ${MESES[parseInt(p[1])-1]}`}
function toStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function isY(f){const n=new Date(),a=new Date(n);a.setDate(a.getDate()-1);return f===toStr(a)}
function isT(f){return f===toStr(new Date())}
function dL(f){return isT(f)?"Hoy":isY(f)?"Ayer":fDate(f)}

function DatePicker({data,dateFrom,dateTo,presetKey,onApply}){
  const[open,setOpen]=useState(false);
  const[calMonth,setCalMonth]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()}});
  const[tmpFrom,setTmpFrom]=useState(dateFrom);
  const[tmpTo,setTmpTo]=useState(dateTo);
  const[tmpPreset,setTmpPreset]=useState(presetKey);
  const[picking,setPicking]=useState(null);
  const ref=useRef(null);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[]);
  useEffect(()=>{if(open){setTmpFrom(dateFrom);setTmpTo(dateTo);setTmpPreset(presetKey);setPicking(null)}},[open]);
  const dataSet=useMemo(()=>new Set(data.map(d=>d.fecha)),[data]);
  const today=toStr(new Date());
  const yd=toStr(new Date(Date.now()-864e5));
  function getPresetDates(key){
    const n=new Date();const t=toStr(n);
    if(key==="today")return{from:t,to:t};
    if(key==="yesterday")return{from:yd,to:yd};
    if(key==="7d"){const d=new Date(n);d.setDate(d.getDate()-6);return{from:toStr(d),to:t}}
    if(key==="14d"){const d=new Date(n);d.setDate(d.getDate()-13);return{from:toStr(d),to:t}}
    if(key==="30d"){const d=new Date(n);d.setDate(d.getDate()-29);return{from:toStr(d),to:t}}
    if(key==="this_week"){const d=new Date(n);const day=d.getDay();const diff=day===0?6:day-1;d.setDate(d.getDate()-diff);return{from:toStr(d),to:t}}
    if(key==="last_week"){const d=new Date(n);const day=d.getDay();const diff=day===0?6:day-1;d.setDate(d.getDate()-diff-7);const e=new Date(d);e.setDate(e.getDate()+6);return{from:toStr(d),to:toStr(e)}}
    if(key==="this_month"){return{from:`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-01`,to:t}}
    if(key==="last_month"){const lm=new Date(n.getFullYear(),n.getMonth()-1,1);const le=new Date(n.getFullYear(),n.getMonth(),0);return{from:toStr(lm),to:toStr(le)}}
    if(key==="this_year"){return{from:`${n.getFullYear()}-01-01`,to:t}}
    if(key==="all"&&data.length){return{from:data[0].fecha,to:data[data.length-1].fecha}}
    return{from:t,to:t}
  }
  const presets=[
    {key:"today",label:"Hoy",icon:"C"},{key:"yesterday",label:"Ayer",icon:"<"},
    {key:"7d",label:"Ultimos 7 dias",icon:"7"},{key:"14d",label:"Ultimos 14 dias",icon:"14"},
    {key:"30d",label:"Ultimos 30 dias",icon:"30"},
    {key:"this_week",label:"Esta semana",icon:"W"},{key:"last_week",label:"Semana pasada",icon:"LW"},
    {key:"this_month",label:"Este mes",icon:"M"},{key:"last_month",label:"Mes pasado",icon:"LM"},
    {key:"this_year",label:"Este ano",icon:"Y"},{key:"all",label:"Todo",icon:"A"}
  ];
  function selectPreset(key){const{from,to}=getPresetDates(key);setTmpFrom(from);setTmpTo(to);setTmpPreset(key);setPicking(null);const p=to.split("-");setCalMonth({y:parseInt(p[0]),m:parseInt(p[1])-1})}
  function clickDay(dateStr){
    setTmpPreset("custom");
    if(!picking||picking==="from"){setTmpFrom(dateStr);setTmpTo(dateStr);setPicking("to")}
    else{if(dateStr<tmpFrom){setTmpFrom(dateStr);setTmpTo(tmpFrom)}else{setTmpTo(dateStr)}setPicking(null)}
  }
  function apply(){onApply(tmpFrom,tmpTo,tmpPreset);setOpen(false)}
  const daysInMonth=new Date(calMonth.y,calMonth.m+1,0).getDate();
  const firstDow=(new Date(calMonth.y,calMonth.m,1).getDay()+6)%7;
  const calDays=[];
  for(let i=0;i<firstDow;i++)calDays.push(null);
  for(let d=1;d<=daysInMonth;d++)calDays.push(d);
  function dayClass(d){
    if(!d)return"dp-day empty";
    const ds=`${calMonth.y}-${String(calMonth.m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    let c="dp-day";
    if(ds===today)c+=" today";if(ds>today)c+=" disabled";if(dataSet.has(ds))c+=" has-data";
    if(tmpFrom&&tmpTo&&ds>=tmpFrom&&ds<=tmpTo){
      if(ds===tmpFrom&&ds===tmpTo)c+=" sel";
      else if(ds===tmpFrom)c+=" range-start";
      else if(ds===tmpTo)c+=" range-end";
      else c+=" in-range";
    }
    return c;
  }
  const presetLabel=presets.find(p=>p.key===presetKey);
  const rangeLabel=presetKey==="custom"?`${fDateShort(dateFrom)} - ${fDateShort(dateTo)}`:presetLabel?presetLabel.label:"Seleccionar";
  const daysCount=dateFrom&&dateTo?Math.round((new Date(dateTo)-new Date(dateFrom))/864e5)+1:0;

  return React.createElement("div",{ref:ref,style:{position:"relative"}},
    React.createElement("div",{className:"dp-trigger"+(open?" open":""),onClick:()=>setOpen(!open)},
      React.createElement("svg",{width:16,height:16,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,style:{color:"var(--acc)"}},
        React.createElement("rect",{x:3,y:4,width:18,height:18,rx:2}),
        React.createElement("line",{x1:16,y1:2,x2:16,y2:6}),
        React.createElement("line",{x1:8,y1:2,x2:8,y2:6}),
        React.createElement("line",{x1:3,y1:10,x2:21,y2:10})
      ),
      React.createElement("div",null,
        React.createElement("div",{className:"dp-label"},rangeLabel),
        React.createElement("div",{className:"dp-sub"},daysCount===1?"1 dia":daysCount+" dias")
      ),
      React.createElement("svg",{width:10,height:10,viewBox:"0 0 10 10",style:{color:"var(--txD)"}},
        React.createElement("path",{d:"M2 3.5L5 6.5L8 3.5",stroke:"currentColor",strokeWidth:1.5,fill:"none"})
      )
    ),
    open&&React.createElement("div",{className:"dp-dropdown"},
      React.createElement("div",{className:"dp-grid"},
        React.createElement("div",{className:"dp-presets"},
          presets.map(function(p){return React.createElement("button",{key:p.key,className:"dp-preset"+(tmpPreset===p.key?" active":""),onClick:function(){selectPreset(p.key)}},
            React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
              React.createElement("span",{style:{fontSize:12}},p.icon),
              React.createElement("span",null,p.label)
            )
          )})
        ),
        React.createElement("div",{className:"dp-cal"},
          React.createElement("div",{className:"dp-cal-head"},
            React.createElement("div",{className:"dp-cal-title"},MESES_FULL[calMonth.m]+" "+calMonth.y),
            React.createElement("div",{className:"dp-cal-nav"},
              React.createElement("button",{onClick:function(){setCalMonth(function(p){return p.m===0?{y:p.y-1,m:11}:{y:p.y,m:p.m-1}})}},"<"),
              React.createElement("button",{onClick:function(){var n=new Date();setCalMonth({y:n.getFullYear(),m:n.getMonth()})}},"o"),
              React.createElement("button",{onClick:function(){setCalMonth(function(p){return p.m===11?{y:p.y+1,m:0}:{y:p.y,m:p.m+1}})}},">"
              )
            )
          ),
          React.createElement("div",{className:"dp-weekdays"},
            ["LU","MA","MI","JU","VI","SA","DO"].map(function(w){return React.createElement("div",{key:w,className:"dp-wd"},w)})
          ),
          React.createElement("div",{className:"dp-days"},
            calDays.map(function(d,i){
              if(!d)return React.createElement("div",{key:"e"+i,className:"dp-day empty"});
              var ds=calMonth.y+"-"+String(calMonth.m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
              var isFuture=ds>today;
              return React.createElement("button",{key:i,className:dayClass(d),disabled:isFuture,onClick:function(){if(!isFuture)clickDay(ds)}},d);
            })
          )
        )
      ),
      React.createElement("div",{className:"dp-footer"},
        React.createElement("div",{className:"dp-footer-range"},
          React.createElement("span",null,tmpFrom?fDateShort(tmpFrom):"-"),

    return E("div",{key:ad.adId+i,className:"ad-card",onClick:function(){setAdModal(ad)},style:{position:"relative"}},
      E("div",{style:{position:"relative"}},

          E("div",{style:{background:"var(--bg2)",borderRadius:6,padding:"6px 8px"}},E("div",{style:{fontSize:7,fontWeight:700,color:"var(--txD)",letterSpacing:".1em"}},"CLICKS"),E("div",{style:{fontFamily:"'JetBrains Mono'",fontSize:12,fontWeight:600,color:"var(--txM)"}},fmt(ad.clicks))),

        )

  var adsFilterBar = E("div",{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},

    E("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}},currentAds.map(adCardRender)),

  return E("div",{style:{background:"var(--bg)",minHeight:"100vh"}},
    E("div",{style:{position:"fixed",inset:0,opacity:.015,background:"url('data:image/svg+xml,%3Csvg viewBox=\"0 0 256 256\" xmlns=\"http://www.w3.org/2000/svg\"%3E%3Cfilter id=\"n\"%3E%3CfeTurbulence type=\"fractalNoise\" baseFrequency=\"0.9\" numOctaves=\"4\" stitchTiles=\"stitch\"/%3E%3C/filter%3E%3Crect width=\"100%25\" height=\"100%25\" filter=\"url(%23n)\"/%3E%3C/svg%3E')",pointerEvents:"none",zIndex:0}}),
    headerEl,
    E("main",{style:{padding:"20px 24px",maxWidth:1340,margin:"0 auto",position:"relative",zIndex:1}},
      kpisEl,

      acctEl,
