    select{background:var(--bg2);color:var(--txM);border:1px solid var(--brd);border-radius:6px;padding:5px 8px;font-size:10px;font-family:'Outfit';font-weight:600;cursor:pointer;outline:none}
    select:focus{border-color:var(--acc)}
  </style>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo}=React;
const{BarChart,Bar,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Area,AreaChart}=Recharts;

const SHEET_ID="1qD2vl0-vVmrlK0HCjA5wkyheOq4fjV8HCFMFVBLOl98";
const CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Diario`;
const FX_URL="https://open.er-api.com/v6/latest/MXN";

function parseCSV(t){const l=t.split("\n").filter(l=>l.trim());if(l.length<2)return[];const h=l[0].split(",").map(h=>h.replace(/"/g,"").trim());return l.slice(1).map(line=>{const v=[];let c="",q=false;for(const ch of line){if(ch==='"'){q=!q}else if(ch===","&&!q){v.push(c.trim());c=""}else{c+=ch}}v.push(c.trim());const r={};h.forEach((hh,i)=>{r[hh]=v[i]||""});return r})}

const pn=v=>{if(!v)return 0;let s=String(v).replace(/"/g,"").trim();s=s.replace(/,(\d+)$/,".$1");s=s.replace(/,/g,"");const n=parseFloat(s);return isNaN(n)?0:n};

const CURRENCIES={MXN:{sym:"$",flag:"🇲🇽",name:"MXN"},USD:{sym:"$",flag:"🇺🇸",name:"USD"},COP:{sym:"$",flag:"🇨🇴",name:"COP"}};

function fmt(n,d=0){return new Intl.NumberFormat("es-MX",{minimumFractionDigits:d,maximumFractionDigits:d}).format(n)}
function fP(n){return fmt(n,1)+"%"}
function safe(n,d){return d>0?n/d:0}
function sum(a,k){return a.reduce((s,d)=>s+d[k],0)}

function fDate(fecha){
  const p=fecha.split("-");if(p.length!==3)return fecha;
  const m=["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  return`${parseInt(p[2])} ${m[parseInt(p[1])]} ${p[0]}`;
}
function isYesterday(f){const n=new Date(),a=new Date(n);a.setDate(a.getDate()-1);return f===`${a.getFullYear()}-${String(a.getMonth()+1).padStart(2,"0")}-${String(a.getDate()).padStart(2,"0")}`}
function isToday(f){const n=new Date();return f===`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`}
function dateLabel(f){if(isToday(f))return"Hoy";if(isYesterday(f))return"Ayer";return fDate(f)}

function KPI({label,value,sub,color,icon,trend,delay=0}){
  const[h,sH]=useState(false);
  return React.createElement("div",{onMouseEnter:()=>sH(true),onMouseLeave:()=>sH(false),style:{background:h?"var(--cardH)":"var(--card)",border:`1px solid ${h?color+"60":"var(--brd)"}`,borderRadius:"var(--r)",padding:"16px 18px",position:"relative",overflow:"hidden",cursor:"default",transition:"all .3s cubic-bezier(.4,0,.2,1)",boxShadow:h?`0 4px 30px ${color}15`:"none",animation:`fadeUp .5s ease-out ${delay}s both`}},
    React.createElement("div",{style:{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${color},transparent)`,opacity:h?.8:.3,transition:"opacity .3s"}}),
    React.createElement("div",{style:{fontSize:9,fontWeight:700,letterSpacing:".14em",textTransform:"uppercase",color:"var(--txD)",marginBottom:8}},icon+" "+label),
    React.createElement("div",{style:{fontFamily:"'JetBrains Mono'",fontSize:22,fontWeight:600,color:"var(--txt)",letterSpacing:"-.03em",lineHeight:1}},value),
    sub&&React.createElement("div",{style:{fontSize:10,color:trend==="up"?"var(--acc)":trend==="down"?"var(--dng)":"var(--txD)",marginTop:7,fontWeight:500}},sub)
  );
}

function Card({title,children,delay=0}){
  return React.createElement("div",{style:{background:"var(--card)",border:"1px solid var(--brd)",borderRadius:"var(--r)",padding:"18px 20px",animation:`fadeUp .5s ease-out ${delay}s both`}},
    React.createElement("div",{style:{fontSize:10,fontWeight:700,letterSpacing:".12em",textTransform:"uppercase",color:"var(--txD)",marginBottom:14,display:"flex",alignItems:"center",gap:6}},
      React.createElement("div",{style:{width:3,height:12,borderRadius:2,background:"var(--acc)",opacity:.6}}),title),
    children
  );
}

function Tip({active,payload,label,formatter}){
  if(!active||!payload)return null;
  return React.createElement("div",{style:{background:"#13132080",backdropFilter:"blur(16px)",border:"1px solid var(--brd)",borderRadius:10,padding:"10px 14px",fontSize:11,boxShadow:"0 12px 40px rgba(0,0,0,.5)"}},
    React.createElement("div",{style:{color:"var(--txD)",marginBottom:6,fontWeight:700,fontSize:10}},label),
    payload.map((p,i)=>React.createElement("div",{key:i,style:{color:p.color,marginBottom:2,display:"flex",justifyContent:"space-between",gap:20}},
      React.createElement("span",{style:{opacity:.8}},p.name),
      React.createElement("span",{style:{fontFamily:"'JetBrains Mono'",fontWeight:600}},formatter?formatter(p.value):typeof p.value==="number"&&p.value>100?fMoney(p.value):String(p.value))
    ))
  );
}

// Global currency formatter — set by App
let fMoney=n=>"$"+fmt(n);
let fMoneyK=n=>`$${(n/1000).toFixed(0)}k`;

function App(){
  const[data,setData]=useState([]);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);const[range,setRange]=useState(30);const[tick,setTick]=useState(0);const[selDay,setSelDay]=useState("");
  const[cur,setCur]=useState("MXN");const[fx,setFx]=useState({MXN:1,USD:1,COP:1});const[fxOk,setFxOk]=useState(false);

  // Currency conversion rate from MXN
  const rate=fx[cur]||1;
  const curInfo=CURRENCIES[cur];
  fMoney=(n)=>`${curInfo.sym}${fmt(n*rate)}`;
  fMoneyK=(n)=>`${curInfo.sym}${((n*rate)/1000).toFixed(0)}k`;
  const fM=(n)=>fMoney(n);

  const load=useCallback(async()=>{
    setLoading(true);setError(null);
    try{
      // Fetch sheet + exchange rates in parallel
      const[sheetRes,fxRes]=await Promise.all([
        fetch(CSV_URL),
        fxOk?Promise.resolve(null):fetch(FX_URL).catch(()=>null)
      ]);
      if(!sheetRes.ok)throw new Error("Sheet no accesible. Hazlo público: Compartir → Cualquier persona con el enlace → Lector");
      const t=await sheetRes.text();const rows=parseCSV(t);
      if(!rows.length)throw new Error("Sheet vacío");

      // Parse exchange rates (MXN base)
      if(fxRes&&fxRes.ok){
        try{
          const fxData=await fxRes.json();
          if(fxData.rates){
            setFx({MXN:1,USD:fxData.rates.USD||0.058,COP:fxData.rates.COP||233});
            setFxOk(true);
          }
        }catch(e){setFx({MXN:1,USD:0.058,COP:233})}
      }

      const c=rows.filter(r=>r["Fecha"]&&r["Fecha"].length>=8).map(r=>({
        fecha:r["Fecha"],oEnv:pn(r["Órdenes Envia"]),pEnv:pn(r["Productos Envia"]),
        vEnv:pn(r["Ventas Envia MXN"]),cEnv:pn(r["Costo Envío Envia MXN"]),
        oDro:pn(r["Órdenes Dropi"]),pDro:pn(r["Productos Dropi"]),
        vDro:pn(r["Ventas Dropi MXN"]),cDro:pn(r["Costo Envío Dropi MXN"]),
        oTot:pn(r["Órdenes Totales"]),pTot:pn(r["Productos Totales"]),
        vTot:pn(r["Ventas Totales MXN"]),cProd:pn(r["Costo Producto MXN"]),
        pub:pn(r["Gasto Publicidad MXN"]),cShip:pn(r["Costo Envío Total MXN"]),
        ops:pn(r["Gastos Operaciones MXN"]),devol:pn(r["Devoluciones MXN"]),
        cTot:pn(r["Costo Total MXN"]),util:pn(r["Utilidad Bruta MXN"]),
        pUtil:pn(r["% Utilidad"]),cpa:pn(r["CPA MXN"]),aov:pn(r["AOV MXN"]),roas:pn(r["ROAS"]),tc:pn(r["Tipo de Cambio"])
      })).sort((a,b)=>a.fecha.localeCompare(b.fecha));
      setData(c);
    }catch(e){setError(e.message)}finally{setLoading(false)}
  },[tick]);

  useEffect(()=>{load()},[load]);

  const viewMode=selDay?"day":"range";
  const f=useMemo(()=>{
    if(selDay)return data.filter(d=>d.fecha===selDay);
    return data.slice(-range);
  },[data,range,selDay]);

  if(loading)return React.createElement("div",{style:{background:"var(--bg)",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
    React.createElement("div",{style:{textAlign:"center"}},
      React.createElement("div",{style:{width:48,height:48,border:"3px solid var(--brd)",borderTopColor:"var(--acc)",borderRadius:"50%",animation:"spin .7s linear infinite",margin:"0 auto 20px"}}),
      React.createElement("div",{style:{color:"var(--txD)",fontSize:13}},"Conectando a Google Sheets...")
    )
  );

  if(error)return React.createElement("div",{style:{background:"var(--bg)",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}},
    React.createElement("div",{style:{background:"var(--card)",border:"1px solid var(--brd)",borderRadius:20,padding:"48px 40px",maxWidth:440,textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.4)"}},
      React.createElement("div",{style:{fontSize:48,marginBottom:16}},"⚠️"),
      React.createElement("div",{style:{color:"var(--txt)",fontSize:20,fontWeight:700,marginBottom:10}},"Conexión fallida"),
      React.createElement("div",{style:{color:"var(--txM)",fontSize:13,lineHeight:1.6,marginBottom:28}},error),
      React.createElement("button",{onClick:()=>setTick(t=>t+1),style:{background:"var(--acc)",color:"var(--bg)",border:"none",borderRadius:10,padding:"12px 32px",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(0,229,160,.3)"}},"Reintentar")
    )
  );

  const hoy=f[f.length-1];const ayer2=data.length>=2?data[data.length-2]:null;
  const tV=sum(f,"vTot"),tU=sum(f,"util"),tO=sum(f,"oTot"),tP=sum(f,"pub");
  const mCPA=safe(tP,tO),mAOV=safe(tV,tO),mROAS=safe(tV,tP),mMarg=safe(tU,tV)*100;
  const tVE=sum(f,"vEnv"),tVD=sum(f,"vDro"),tOE=sum(f,"oEnv"),tOD=sum(f,"oDro");

  const costs=[{n:"Producto",v:sum(f,"cProd"),c:"#4466ff"},{n:"Publicidad",v:tP,c:"#ffb020"},{n:"Envío",v:sum(f,"cShip"),c:"#a855f7"},{n:"Operaciones",v:sum(f,"ops"),c:"#8888a8"},{n:"Devoluciones",v:sum(f,"devol"),c:"#ff4060"}];

  const cd=f.map(d=>({f:d.fecha.slice(5),ventas:d.vTot*rate,util:d.util*rate,pub:d.pub*rate,roas:d.roas,cpa:d.cpa*rate,aov:d.aov*rate,vE:d.vEnv*rate,vD:d.vDro*rate,oE:d.oEnv,oD:d.oDro}));

  const tr=(h2,a2,k)=>{if(!h2||!a2)return null;const d=h2[k]-a2[k];const p=a2[k]>0?(d/a2[k])*100:0;return{dir:d>=0?"up":"down",label:`${d>=0?"▲":"▼"} ${fP(Math.abs(p))} vs ayer`}};
  const presets=[{l:"7D",d:7},{l:"14D",d:14},{l:"30D",d:30},{l:"ALL",d:9999}];
  const viewTitle=selDay?`📅 ${dateLabel(selDay)}`:`Últimos ${Math.min(range,data.length)} días`;

  // Currency toggle component
  const CurrencyToggle=()=>React.createElement("div",{style:{display:"flex",gap:2,background:"var(--bg2)",borderRadius:8,padding:2,border:"1px solid var(--brd)"}},
    ["MXN","USD","COP"].map(c=>React.createElement("button",{key:c,onClick:()=>setCur(c),style:{padding:"4px 10px",borderRadius:6,fontSize:9,fontWeight:700,border:"none",letterSpacing:".05em",background:cur===c?"var(--acc)":"transparent",color:cur===c?"var(--bg)":"var(--txD)",cursor:"pointer",transition:"all .2s",display:"flex",alignItems:"center",gap:3}},
      React.createElement("span",{style:{fontSize:11}},CURRENCIES[c].flag),c
    ))
  );

  return React.createElement("div",{style:{background:"var(--bg)",minHeight:"100vh"}},
    React.createElement("div",{style:{position:"fixed",inset:0,opacity:.015,background:"url('data:image/svg+xml,%3Csvg viewBox=\"0 0 256 256\" xmlns=\"http://www.w3.org/2000/svg\"%3E%3Cfilter id=\"n\"%3E%3CfeTurbulence type=\"fractalNoise\" baseFrequency=\"0.9\" numOctaves=\"4\" stitchTiles=\"stitch\"/%3E%3C/filter%3E%3Crect width=\"100%25\" height=\"100%25\" filter=\"url(%23n)\"/%3E%3C/svg%3E')",pointerEvents:"none",zIndex:0}}),

    // HEADER
    React.createElement("header",{style:{borderBottom:"1px solid var(--brd)",padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"rgba(7,7,12,.85)",backdropFilter:"blur(20px)",zIndex:20}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
        React.createElement("div",{style:{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,var(--acc),var(--blu))",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:14,color:"var(--bg)",boxShadow:"0 2px 12px rgba(0,229,160,.25)"}},"G"),
        React.createElement("div",null,
          React.createElement("div",{style:{fontSize:14,fontWeight:800,letterSpacing:".08em"}},"GUFFO"),
          React.createElement("div",{style:{fontSize:9,color:"var(--txD)",letterSpacing:".1em",fontWeight:600}},viewTitle)
        )
      ),
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
        React.createElement(CurrencyToggle),
        React.createElement("select",{value:selDay,onChange:e=>{setSelDay(e.target.value)},style:{minWidth:100}},
          React.createElement("option",{value:""},"Rango"),
          [...data].reverse().map(d=>React.createElement("option",{key:d.fecha,value:d.fecha},dateLabel(d.fecha)+" — "+d.fecha))
        ),
        !selDay&&React.createElement("div",{style:{display:"flex",gap:3,background:"var(--bg2)",borderRadius:8,padding:3}},
          presets.map(p=>React.createElement("button",{key:p.l,onClick:()=>setRange(p.d),style:{padding:"5px 13px",borderRadius:6,fontSize:10,fontWeight:700,border:"none",letterSpacing:".06em",background:range===p.d?"var(--acc)":"transparent",color:range===p.d?"var(--bg)":"var(--txD)",cursor:"pointer",transition:"all .2s"}},p.l))
        ),
        React.createElement("button",{onClick:()=>setTick(t=>t+1),style:{background:"var(--bg2)",border:"1px solid var(--brd)",borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--txD)",fontSize:14,cursor:"pointer"}},"↻")
      )
    ),

    React.createElement("main",{style:{padding:"20px 24px",maxWidth:1340,margin:"0 auto",position:"relative",zIndex:1}},

      // KPIs
      React.createElement("div",{className:"g g6",style:{marginBottom:12}},
        React.createElement(KPI,{icon:"💰",label:"Ventas",value:fM(tV),sub:viewMode==="day"?fDate(hoy?.fecha||""):tr(hoy,ayer2,"vTot")?.label,color:"var(--acc)",trend:viewMode==="day"?null:tr(hoy,ayer2,"vTot")?.dir,delay:0}),
        React.createElement(KPI,{icon:"📊",label:"Utilidad",value:fM(tU),sub:`Margen ${fP(mMarg)}`,color:tU>0?"var(--acc)":"var(--dng)",trend:tU>0?"up":"down",delay:.05}),
        React.createElement(KPI,{icon:"📦",label:"Órdenes",value:fmt(tO),sub:viewMode==="day"?`${fmt(hoy?.pTot||0)} productos`:(hoy?`Último: ${fmt(hoy.oTot)}`:""),color:"var(--blu)",delay:.1}),
        React.createElement(KPI,{icon:"🎯",label:"ROAS",value:fmt(mROAS,1)+"x",sub:viewMode==="day"?"":(hoy?`Último: ${fmt(hoy.roas,1)}x`:""),color:"var(--wrn)",delay:.15}),
        React.createElement(KPI,{icon:"💸",label:"CPA",value:fM(mCPA),sub:viewMode==="day"?"":(hoy?`Último: ${fM(hoy.cpa)}`:""),color:"var(--pur)",delay:.2}),
        React.createElement(KPI,{icon:"🛒",label:"AOV",value:fM(mAOV),sub:viewMode==="day"?"":(hoy?`Último: ${fM(hoy.aov)}`:""),color:"var(--blu)",delay:.25})
      ),

      // ROW 1
      React.createElement("div",{className:"g g21",style:{marginBottom:12}},
        React.createElement(Card,{title:viewMode==="day"?"Resumen del Día":"Ventas vs Utilidad",delay:.3},
          viewMode==="day"&&hoy?
          React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}},
            [{l:"Ventas Envia",v:fM(hoy.vEnv),c:"var(--acc)"},{l:"Ventas Dropi",v:fM(hoy.vDro),c:"var(--pur)"},{l:"Ventas Total",v:fM(hoy.vTot),c:"var(--txt)"},
             {l:"Órdenes Envia",v:fmt(hoy.oEnv),c:"var(--acc)"},{l:"Órdenes Dropi",v:fmt(hoy.oDro),c:"var(--pur)"},{l:"Órdenes Total",v:fmt(hoy.oTot),c:"var(--txt)"},
             {l:"Costo Envío",v:fM(hoy.cShip||0),c:"var(--txM)"},{l:"Costo Producto",v:fM(hoy.cProd),c:"var(--txM)"},{l:"Publicidad",v:fM(hoy.pub),c:"var(--wrn)"},
             {l:"Operaciones",v:fM(hoy.ops),c:"var(--txM)"},{l:"Devoluciones",v:fM(hoy.devol),c:"var(--dng)"},{l:"Costo Total",v:fM(hoy.cTot),c:"var(--dng)"}
            ].map((item,i)=>React.createElement("div",{key:i,style:{padding:"10px 12px",borderRadius:8,background:"var(--bg)",border:"1px solid var(--brd)"}},
              React.createElement("div",{style:{fontSize:8,fontWeight:700,letterSpacing:".12em",color:"var(--txD)",marginBottom:4,textTransform:"uppercase"}},item.l),
              React.createElement("div",{style:{fontFamily:"'JetBrains Mono'",fontSize:16,fontWeight:600,color:item.c}},item.v)
            ))
          )
          :
          React.createElement(ResponsiveContainer,{width:"100%",height:250},
            React.createElement(AreaChart,{data:cd},
              React.createElement("defs",null,
                React.createElement("linearGradient",{id:"gV",x1:0,y1:0,x2:0,y2:1},React.createElement("stop",{offset:"0%",stopColor:"#00e5a0",stopOpacity:.2}),React.createElement("stop",{offset:"100%",stopColor:"#00e5a0",stopOpacity:0})),
                React.createElement("linearGradient",{id:"gU",x1:0,y1:0,x2:0,y2:1},React.createElement("stop",{offset:"0%",stopColor:"#4466ff",stopOpacity:.2}),React.createElement("stop",{offset:"100%",stopColor:"#4466ff",stopOpacity:0}))
              ),
              React.createElement(CartesianGrid,{strokeDasharray:"3 3",stroke:"#1a1a2e"}),
              React.createElement(XAxis,{dataKey:"f",tick:{fill:"#55556a",fontSize:9},axisLine:false,tickLine:false}),
              React.createElement(YAxis,{tick:{fill:"#55556a",fontSize:9},axisLine:false,tickLine:false,tickFormatter:v=>{const cv=v;return cv>=1000?`${curInfo.sym}${(cv/1000).toFixed(0)}k`:`${curInfo.sym}${cv}`}}),
              React.createElement(Tooltip,{content:React.createElement(Tip)}),
              React.createElement(Area,{type:"monotone",dataKey:"ventas",name:"Ventas",stroke:"#00e5a0",fill:"url(#gV)",strokeWidth:2,dot:false}),
              React.createElement(Area,{type:"monotone",dataKey:"util",name:"Utilidad",stroke:"#4466ff",fill:"url(#gU)",strokeWidth:2,dot:false})
            )
          )
        ),
        React.createElement(Card,{title:"Desglose de Costos",delay:.35},
